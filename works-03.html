<div class="work-detail-text work-detail-text--center">

<p>沸騰したお湯の音は、「ぐつぐつ」と答えるのが一般的だ。しかし、その擬音は本当に実際の音を表しているのだろうか。</p>

<p>色の種類が無限なら音も同じなのではと考え動画を制作した。</p>

<p>水の形に音を重ね合わせ、毎秒変化していく滑らかな姿を丁寧に追った。</p>
